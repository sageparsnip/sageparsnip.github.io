<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Ferelden Tower Jukebox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/player.css">
</head>
<body class="bg-dark text-light">

<div class="container my-4 mb-player">
  <h1 class="mb-4">Ferelden Tower Jukebox</h1>

  <div id="playlistContainer"></div>
</div>

<!-- Sticky Player Bar -->
<div id="playerBar" class="bg-black border-top fixed-bottom p-2">
  <div class="container">
    <div class="row g-2 align-items-center">

      <!-- Now Playing -->
      <div class="col-8 text-truncate" id="nowPlaying">
        Nothing playing
      </div>

      <!-- Volume -->
      <div class="col-4">
        <input type="range"
               class="form-range"
               id="volumeSlider"
               min="0"
               max="1"
               step="0.01"
               value="1">
      </div>

      <!-- Progress -->
      <div class="col-12">
        <input type="range"
               class="form-range"
               id="progressBar"
               min="0"
               max="100"
               value="0">
        <div class="d-flex justify-content-between small text-secondary">
          <span id="currentTime">0:00</span>
          <span id="duration">0:00</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="col-12 text-center">
        <button class="btn btn-outline-light btn-md" id="prevBtn">⏮</button>
        <button class="btn btn-outline-light btn-md mx-2" id="playPauseBtn">▶️</button>
        <button class="btn btn-outline-light btn-md" id="nextBtn">⏭</button>
      </div>

      

    </div>
  </div>
</div>


<audio id="audioPlayer"></audio>

<!-- jQuery + Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/player.js"></script>
</body>
</html>
